# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

context:
  version: "1.2.2" # package version
  package_name: "redis" # package name
  package_path: "../src/" # package path, TODO X: 注意是相对此文件的路径 !!!

package:
  name: ${{ package_name }}
  version: ${{ version }}

source:
  - path: ${{ package_path }} # TODO X: 包含 cargo.toml 的路径!!!

build:
  script:
    - mkdir -p ${PREFIX}/lib/mojo
    - pixi run mojo precompile ${{ package_name }} -o ${PREFIX}/lib/mojo/${{ package_name }}.mojoc
    # - pixi run mojo precompile . -o ${PREFIX}/lib/mojo/${{ package_name }}.mojoc

requirements:
  run:
    - mojo >=1.0.0b2.dev2026052506,<2

about:
  homepage: https://github.com/better-mojo/disc
  license: MIT
  summary: "redis-rs binding for mojo"
  repository: https://github.com/better-mojo/disc
