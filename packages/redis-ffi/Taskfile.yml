version: "3"

tasks:
  pixi:
    cmds:
      - pixi {{.CLI_ARGS}}

  cargo:
    cmds:
      - cargo {{.CLI_ARGS}}

  gen:
    cmds:
      - cargo clean
      - cargo run --bin generate-headers

  build:
    aliases: ["b"]
    cmds:
      - cargo test --features c-headers -- generate_headers
      - cargo build
      - open target/debug
    ignore_error: true

  release:
    aliases: ["rel"]
    cmds:
      - cargo test --features c-headers -- generate_headers
      - cargo build --release
      - open target/release
    ignore_error: true

  run:c:
    aliases: ["r"]
    cmds:
      - task: b
      - gcc -L ./target/debug -l redis_ffi -o main main.c -include stdio.h
      - ./main
      - rm -rf main
    ignore_error: true

  run:rust:
    aliases: ["rr"]
    cmds:
      - cargo run --example basic
    ignore_error: true

  publish:ffi:
    aliases: ["upf", "up:ffi", "pub", "pub:auto"]
    vars:
      UP_PKGS:
        sh: find . -name "*.conda" -type f
    cmds:
      - echo $PREFIX_DEV_API_KEY
      - echo {{ .UP_PKGS }}
      - for: { var: UP_PKGS }
        cmd: |
          pixi run -e=dev rattler-build upload prefix -c "better-ffi" \
            --api-key=$PREFIX_DEV_API_KEY \
            {{.ITEM}}
      - open https://prefix.dev/channels/better-ffi
    dir: output/

  clean:
    aliases: ["cl", "del", "rm"]
    cmds:
      - cargo clean
      - rm -rf target/
