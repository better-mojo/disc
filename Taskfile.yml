version: "3"

#
# sub namespace: https://taskfile.dev/#/usage?id=including-other-taskfiles
#
includes:
  demo-ffi:
    aliases: ["df"]
    taskfile: ./packages/demo-ffi/
    dir: ./packages/demo-ffi/
    optional: true

  redis-ffi:
    aliases: ["rf"]
    taskfile: ./packages/redis-ffi/
    dir: ./packages/redis-ffi/
    optional: true

  redis:
    aliases: ["r"]
    taskfile: ./packages/redis/
    dir: ./packages/redis/
    optional: true

  uuid-ffi:
    aliases: ["uf"]
    taskfile: ./packages/uuid-ffi/
    dir: ./packages/uuid-ffi/
    optional: true

  uuid-mojo:
    aliases: ["um"]
    taskfile: ./packages/uuid-mojo/
    dir: ./packages/uuid-mojo/
    optional: true

  hyper-ffi:
    aliases: ["hf"]
    taskfile: ./packages/hyper-ffi/
    dir: ./packages/hyper-ffi/
    optional: true

  reqwest-ffi:
    aliases: ["reqf"]
    taskfile: ./packages/reqwest-ffi/
    dir: ./packages/reqwest-ffi/
    optional: true

  disc-ffi:
    aliases: ["disc:f"]
    taskfile: ./packages/disc-ffi/
    dir: ./packages/disc-ffi/
    optional: true

vars:
  VAR1: "some-var"

env:
  ENV1: testing
  WORKSPACE: "packages/"

# env file:
dotenv:
  - .env

################################################################################################

tasks:
  doctor:
    aliases: ["check"]
    cmds:
      - task --version
      - cargo -V
      - pixi -V
      - rattler-build -V
      - pixi run mojo --version

  pixi:
    cmds:
      - pixi {{.CLI_ARGS}}

  version:
    cmds:
      - pixi run mojo --version

  setup:
    cmds:
      - npx skills add modular/skills

  # https://rattler-build.prefix.dev/latest/#installation
  install:rattler-build:
    aliases: ["i:rb"]
    cmds:
      - pixi global install rattler-build

  install:skills:
    aliases: ["i:skills"]
    cmds:
      - npx skills add modular/skills

  install:
    aliases: ["i"]
    cmds:
      - pixi install # 安装 pixi 依赖包

  docs:
    cmds:
      - pixi i -e=dev
      - pixi run -e=dev mkdocs serve --open --watch=docs --watch=mkdocs.yml --dev-addr=localhost:5005

  docs:deploy:
    aliases: ["docs:d"]
    cmds:
      - pixi i -e=dev
      - pixi run -e=dev mkdocs gh-deploy # build and create gh-pages branch
      - git push origin gh-pages:gh-pages --force # push to public repo

  dev:
    cmds:
      - rustup toolchain install nightly
      - rustup toolchain list

  # 编译发布 Linux-64 版本， 基于 orbstack 虚拟机
  shell:linux-64:
    aliases: ["sh:linux-64", "sh:linux"]
    cmds:
      - orbctl run -m u22build

  # 编译发布 Linux-aarch64 版本， 基于 orbstack 虚拟机
  shell:linux-aarch64:
    aliases: ["sh:linux-aarch64"]
    cmds:
      - orbctl run -m u22dev

  rsync:
    aliases: ["rs"]
    cmds: # 忽略目录 = [.git/, .github/, ], 改写成 for 循环
      - |
        for repo in {{.REPOS}}; do
          rsync -avzdelete-after --exclude=".git/" --exclude=".github/" ./tmp/$repo/ ./packages/$repo/
        done
    vars:
      REPOS: "flare sqlite morph json envo mobin"

  clone:
    aliases: ["cl"]
    cmds:
      - git clone git@github.com:better-mojo/sqlite.git
      - git clone git@github.com:better-mojo/morph.git
      - git clone git@github.com:ehsanmok/json.git
      - git clone git@github.com:ehsanmok/envo.git
    dir: ./tmp/
    ignore_error: true

  ################################################################################

  count:
    cmds:
      - tokei # 代码统计: https://github.com/XAMPPRocky/tokei

  quick:
    aliases: ["q"]
    cmds:
      - task: cc
      - task: push

  # usage: task rc -- 2
  rc:
    aliases: ["reset:commit"]
    cmds:
      - git reset --soft HEAD~{{.CLI_ARGS}}
      - task: c

  cc:
    cmds:
      - task: commit
      - task: commit

  commit:
    aliases: ["c"]
    cmds:
      - git add .
      - git status
      - |
        git commit -m 'chore: 💪 update' --no-verify
    ignore_error: true

  commit:ai:
    aliases: ["c:ai"]
    cmds:
      - git add .
      - git status
      - |
        git commit -m 'chore: 🤖 update' --no-verify
    ignore_error: true

  pull:
    cmds:
      - git config pull.rebase false
      - git pull origin main

  push:
    cmds:
      - git push origin main --tags
      - repo_url=`git remote -v | grep push | awk -F ":" '{print $2}' | awk -F
        ".git" '{print "https://github.com/"$1}'`; open $repo_url
